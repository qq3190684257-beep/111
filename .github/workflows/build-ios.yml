name: Build NativeTrajectory arm64 dylib

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain profile
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          xcrun --sdk iphoneos --find clang++

      - name: Geometry tests and arm64 build
        run: make package

      - name: Verify artifact
        run: |
          file dist/NativeTrajectory.dylib
          codesign -dvv dist/NativeTrajectory.dylib
          shasum -a 256 -c dist/SHA256SUMS.txt

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: NativeTrajectory-arm64
          path: |
            dist/NativeTrajectory.dylib
            dist/NativeTrajectory-arm64.zip
            dist/SHA256SUMS.txt
            dist/README.md
            dist/RELEASE_NOTES_*.md
          if-no-files-found: error
          retention-days: 14
